name: Web Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  web-test:
    name: Run Web Tests
    runs-on: ubuntu-latest     # Free Linux runner (cheapest, 1x rate)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Chrome comes pre-installed on ubuntu-latest
      - name: Verify Chrome installation
        run: google-chrome --version

      - name: Run web tests
        run: npm run test:web

      - name: Run Zenda web tests
        run: npm run test:web:zenda
        if: success()

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-logs
          path: |
            logs/
            *.log
          retention-days: 7
