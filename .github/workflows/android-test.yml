name: Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-test:
    name: Run Android Tests on Emulator
    runs-on: ubuntu-latest     # Free Linux runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java (required for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Install Appium & UiAutomator2 driver
        run: |
          npx appium driver list --installed | grep uiautomator2 || npx appium driver install uiautomator2
          echo "Appium and UiAutomator2 driver checked/installed"

      - name: Enable KVM for Android Emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: npm run test:android:ci
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-logs
          path: |
            logs/
            *.log
          retention-days: 7
